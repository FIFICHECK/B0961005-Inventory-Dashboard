name: B0961005 Inventory Update

on:
  workflow_dispatch:

jobs:
  update-inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright pandas openpyxl
          playwright install --with-deps chromium

      - name: Run Exchange download script
        run: |
          python << 'PYTHON_SCRIPT'
          import asyncio
          from playwright.async_api import async_playwright
          import time
          import os

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  context = await browser.new_context(
                      accept_downloads=True,
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                  )
                  page = await context.new_page()
                  
                  # Login - use Enter key instead of clicking submit button
                  print("🔐 Logging into Exchange...")
                  await page.goto('https://exchange.hktvmall.com/merchant/shared/loginform.php')
                  await page.wait_for_load_state('domcontentloaded')
                  await page.fill('input[name="username"]', 'jerry')
                  await page.fill('input[name="pwd"]', 'JerRy1985441')
                  await page.press('input[name="pwd"]', 'Enter')
                  await page.wait_for_load_state('domcontentloaded')
                  await page.wait_for_timeout(2000)
                  print("✅ Logged in")
                  
                  # Navigate to inventory report
                  print("📊 Navigating to Inventory Report...")
                  await page.goto('https://exchange.hktvmall.com/merchant/reports/product_inventory_report.php')
                  await page.wait_for_load_state('domcontentloaded')
                  await page.wait_for_timeout(1000)
                  print("✅ On inventory report page")
                  
                  # Select B0961005 - form auto-submits on change, so wait for navigation
                  print("🔄 Selecting B0961005...")
                  async with page.expect_navigation(wait_until='domcontentloaded'):
                      await page.select_option('#batchMerchant', 'B0961005')
                  await page.wait_for_timeout(2000)
                  print("✅ B0961005 selected")
                  
                  # Click the last Download button (most recent report)
                  print("📥 Clicking Download button...")
                  export_btn = page.locator('input[type="submit"][value="Download"]').last
                  async with page.expect_download(timeout=30000) as dl_info:
                      await export_btn.click()
                  download = await dl_info.value
                  timestamp = time.strftime('%Y%m%d_%H%M%S')
                  save_path = f'data/inventory_report_{timestamp}.csv'
                  os.makedirs('data', exist_ok=True)
                  await download.save_as(save_path)
                  print(f"✅ Downloaded to {save_path}")
                  
                  await browser.close()
                  print("🏁 Done")

          asyncio.run(main())
          PYTHON_SCRIPT

      - name: Commit new report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase origin main
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Update inventory report $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ Report committed"
          else
            echo "ℹ️ No changes to commit"
          fi
